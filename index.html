<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Ace League 法律与隐私</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --surface: #fff;
      --text: #171719;
      --secondary: #636366;
      --accent: #0a7c5b;
      --line: #dedee3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --surface: #171719;
        --text: #f5f5f7;
        --secondary: #aeaeb2;
        --accent: #46c89a;
        --line: #38383a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }
    main {
      max-width: 720px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 24px 72px;
      background: var(--surface);
    }
    h1 { margin: 0 0 8px; font-size: 30px; line-height: 1.2; }
    p { margin: 0 0 24px; color: var(--secondary); }
    a {
      display: block;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    a:last-child { border-bottom: 1px solid var(--line); }
  </style>
</head>
<body>
<main>
  <h1>Ace League</h1>
  <p>法律与隐私信息</p>
  <a href="./privacy/">隐私政策</a>
  <a href="./terms/">用户协议</a>
</main>
</body>
</html>
